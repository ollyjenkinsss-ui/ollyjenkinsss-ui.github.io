<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>League Patch Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Barlow Condensed', sans-serif;
  background: linear-gradient(120deg, #0b0f25, #151b40);
  color: #fff;
  transition: background 0.3s, color 0.3s;
}
body.light {
  background: linear-gradient(120deg, #f5f5f5, #dcdcdc);
  color: #111;
}

#header {
  width: 100%;
  box-sizing: border-box;
  padding: 10px 30px;
  background: rgba(20, 30, 60, 0.85);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 10;
}
body.light #header { background: rgba(255, 255, 255, 0.85); }

#header a {
  color: #a5b4fc;
  text-decoration: none;
  font-weight: 600;
}
body.light #header a { color: #3b3b3b; }
#header a:hover { color: #fff; }
body.light #header a:hover { color: #111; }

.toggle-container { display: flex; align-items: center; margin-right: 30px; }
.toggle-wrapper { display: flex; align-items: center; cursor: pointer; }
.toggle-switch {
  width: 50px;
  height: 26px;
  background: #1f273d;
  border-radius: 13px;
  position: relative;
  transition: background 0.3s;
}
body.light .toggle-switch { background: #d1d1d1; }
.toggle-knob {
  width: 24px;
  height: 24px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 1px;
  left: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s;
}
body.light .toggle-knob { transform: translateX(24px); }

.page {
  max-width: 960px;
  margin: 0 auto;
  padding: 88px 20px 30px 20px;
}

.hero {
  padding: 18px 20px;
  border-radius: 14px;
  margin-bottom: 16px;
  background: rgba(20, 30, 60, 0.7);
  border: 1px solid rgba(165, 180, 252, 0.35);
}
body.light .hero {
  background: rgba(255, 255, 255, 0.75);
  border-color: rgba(90, 90, 175, 0.35);
}
.hero h1 {
  margin: 0 0 8px;
  letter-spacing: 0.4px;
}
.hero p {
  margin: 0;
  opacity: 0.9;
}

.status {
  margin: 8px 0 14px;
  font-weight: 600;
  color: #c7d2fe;
}
body.light .status { color: #4c4c6a; }

.notes {
  display: grid;
  gap: 12px;
}

.note {
  border-radius: 12px;
  padding: 14px 16px;
  background: linear-gradient(145deg, #1c2238, #10172a);
  border: 1px solid rgba(165, 180, 252, 0.25);
}
body.light .note {
  background: linear-gradient(145deg, #e5e5e5, #d1d1d1);
  border-color: rgba(90, 90, 175, 0.25);
}
.note h3 {
  margin: 0 0 4px;
}
.note small {
  display: block;
  margin-bottom: 8px;
  opacity: 0.85;
}
.note p {
  margin: 0 0 8px;
}
.note a {
  color: #93c5fd;
}
body.light .note a { color: #1e40af; }

.impact {
  margin-top: 16px;
  border-radius: 14px;
  padding: 16px;
  background: rgba(20, 30, 60, 0.7);
  border: 1px solid rgba(165, 180, 252, 0.35);
}
body.light .impact {
  background: rgba(255, 255, 255, 0.75);
  border-color: rgba(90, 90, 175, 0.35);
}
.impact h2 {
  margin: 0 0 8px;
}
.impact p {
  margin: 0 0 10px;
  opacity: 0.9;
}
.impact-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}
.impact-item {
  border-radius: 10px;
  padding: 10px 12px;
  background: linear-gradient(145deg, #1c2238, #10172a);
  border: 1px solid rgba(165, 180, 252, 0.25);
}
body.light .impact-item {
  background: linear-gradient(145deg, #e5e5e5, #d1d1d1);
  border-color: rgba(90, 90, 175, 0.25);
}
</style>
</head>
<body>
<div id="header">
  <div style="display:flex; gap:18px; align-items:center;">
    <a href="index.html">Champion List & Abilities</a>
    <a>Patch Notes</a>
    <a href="newest-champion.html">Newest Champion</a>
  </div>
  <div class="toggle-container">
    <div class="toggle-wrapper" onclick="toggleDarkMode()">
      <div class="toggle-switch">
        <div class="toggle-knob" id="toggleKnob" aria-label="Toggle Dark Mode"><span id="toggleIcon">đźŚ™</span></div>
      </div>
    </div>
  </div>
</div>

<main class="page">
  <section class="hero">
    <h1>League of Legends Patch Notes</h1>
    <p id="latestVersion">Checking latest patch version...</p>
  </section>
  <div class="status" id="status">Loading current patch notes...</div>
  <section class="notes" id="notes"></section>
  <section class="impact" id="impactSection" style="display:none;">
    <h2>Patch Impact</h2>
    <p id="impactStatus">Analyzing champion impact from recent patch notes...</p>
    <div class="impact-grid" id="impactGrid"></div>
  </section>
</main>

<script>
const DDRAGON_VERSIONS_URL = 'https://ddragon.leagueoflegends.com/api/versions.json';
const DDRAGON_BASE_URL = 'https://ddragon.leagueoflegends.com/cdn';
const OPGG_STATS_URL = 'https://r.jina.ai/http://www.op.gg/champions';
let liveRatesByChampion = {};

function toggleDarkMode() {
  document.body.classList.toggle('light');
  const icon = document.getElementById('toggleIcon');
  icon.textContent = document.body.classList.contains('light') ? 'đźŚž' : 'đźŚ™';
}

function safeText(value, fallback) {
  return typeof value === 'string' && value.trim() ? value : fallback;
}

function normalizeChampionName(name) {
  return `${name || ''}`.toLowerCase().replace(/[^a-z0-9]/g, '');
}

function clampRate(value) {
  const num = Number(value);
  if (Number.isNaN(num) || !Number.isFinite(num)) return null;
  return Math.max(0, Math.min(100, num));
}

function formatRate(value) {
  return value === null ? 'N/A' : `${value.toFixed(2)}%`;
}

async function loadLiveChampionRates() {
  if (Object.keys(liveRatesByChampion).length) return liveRatesByChampion;
  try {
    const text = await (await fetch(OPGG_STATS_URL, { cache: 'no-store' })).text();
    const pattern = /\|\s*\d+\s*\|\s*\[!\[Image[^\]]*\]\([^)]+\)\*\*([^*]+)\*\*\]\([^)]+\)\s*\|[^|]*\|[^|]*\|\s*([0-9.]+)%\s*\|\s*([0-9.]+)%\s*\|\s*([0-9.]+)%\s*\|/g;
    const rates = {};
    let match;
    while ((match = pattern.exec(text)) !== null) {
      const key = normalizeChampionName(match[1]);
      if (!key) continue;
      rates[key] = {
        win: clampRate(match[2]),
        pick: clampRate(match[3]),
        ban: clampRate(match[4])
      };
    }
    liveRatesByChampion = rates;
  } catch (error) {
    console.error('Live rate fetch failed:', error);
    liveRatesByChampion = {};
  }
  return liveRatesByChampion;
}

async function loadLatestPatchVersion() {
  const versionText = document.getElementById('latestVersion');
  try {
    // Realms usually reflects the live client version more reliably than versions[0].
    const realm = await (await fetch('https://ddragon.leagueoflegends.com/realms/na.json')).json();
    const latest = realm && realm.v ? realm.v : null;
    versionText.textContent = latest ? `Current live game version: ${latest}` : 'Current live version unavailable.';
  } catch (error) {
    try {
      const versions = await (await fetch('https://ddragon.leagueoflegends.com/api/versions.json')).json();
      const fallback = Array.isArray(versions) && versions[0] ? versions[0] : null;
      versionText.textContent = fallback ? `Current live game version: ${fallback}` : 'Current live version unavailable.';
    } catch (fallbackError) {
      versionText.textContent = 'Current live version unavailable.';
      console.error(error);
      console.error(fallbackError);
    }
  }
}

function normalizePatchItems(payload) {
  const root = payload && payload.result && payload.result.pageContext ? payload.result.pageContext : null;
  const allPosts = root && Array.isArray(root.posts) ? root.posts : [];
  return allPosts
    .filter(post => post && post.url && /patch[- ]?notes/i.test(`${post.title || ''} ${post.url}`))
    .map(post => ({
      title: safeText(post.title, 'Patch Notes'),
      description: safeText(post.description, 'No description provided.'),
      date: safeText(post.date, ''),
      url: post.url.startsWith('http') ? post.url : `https://www.leagueoflegends.com${post.url}`
    }));
}

function renderPatchNotes(items) {
  const notesRoot = document.getElementById('notes');
  const status = document.getElementById('status');
  notesRoot.innerHTML = '';

  if (!items.length) {
    status.textContent = 'Could not find patch-note entries right now.';
    return;
  }

  status.textContent = `Showing ${Math.min(items.length, 5)} recent patch-note posts`;
  const recent = items.slice(0, 5);
  recent.forEach(item => {
    const card = document.createElement('article');
    card.className = 'note';
    card.innerHTML = `
      <h3>${item.title}</h3>
      <small>${item.date || 'Date unavailable'}</small>
      <p>${item.description}</p>
      <a href="${item.url}" target="_blank" rel="noopener noreferrer">Read full patch notes</a>
    `;
    notesRoot.appendChild(card);
  });
  renderPatchImpact(recent);
}

async function renderPatchImpact(items) {
  const impactSection = document.getElementById('impactSection');
  const impactStatus = document.getElementById('impactStatus');
  const impactGrid = document.getElementById('impactGrid');
  impactSection.style.display = 'block';
  impactGrid.innerHTML = '';
  impactStatus.textContent = 'Analyzing champion impact from recent patch notes...';

  try {
    const versions = await (await fetch(DDRAGON_VERSIONS_URL)).json();
    const latestVersion = Array.isArray(versions) && versions[0] ? versions[0] : null;
    if (!latestVersion) throw new Error('No Data Dragon version available');

    const championsPayload = await (await fetch(`${DDRAGON_BASE_URL}/${latestVersion}/data/en_US/champion.json`)).json();
    const champions = Object.values(championsPayload?.data || {}).map(ch => ({ id: ch.id, name: ch.name }));
    const rates = await loadLiveChampionRates();

    const mentionCounts = new Map();
    const sourceText = items.map(item => `${item.title} ${item.description}`).join(' ').toLowerCase();
    champions.forEach(champ => {
      const escaped = champ.name.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`\\b${escaped}\\b`, 'g');
      const matches = sourceText.match(regex);
      if (matches && matches.length) mentionCounts.set(champ.name, matches.length);
    });

    const impacted = Array.from(mentionCounts.entries())
      .map(([name, mentions]) => {
        const key = normalizeChampionName(name);
        const stat = rates[key] || {};
        return {
          name,
          mentions,
          win: stat.win ?? null,
          pick: stat.pick ?? null,
          ban: stat.ban ?? null
        };
      })
      .sort((a, b) => b.mentions - a.mentions || (b.win ?? 0) - (a.win ?? 0))
      .slice(0, 8);

    if (!impacted.length) {
      impactStatus.textContent = 'No specific champion names were detected in the latest patch-note summaries.';
      return;
    }

    impactStatus.textContent = `Top ${impacted.length} champions mentioned in the latest patch notes`;
    impacted.forEach(entry => {
      const card = document.createElement('article');
      card.className = 'impact-item';
      card.innerHTML = `
        <h3>${entry.name}</h3>
        <small>Mentioned ${entry.mentions} time${entry.mentions > 1 ? 's' : ''}</small>
        <p>Win: ${formatRate(entry.win)} | Pick: ${formatRate(entry.pick)} | Ban: ${formatRate(entry.ban)}</p>
      `;
      impactGrid.appendChild(card);
    });
  } catch (error) {
    console.error(error);
    impactStatus.textContent = 'Patch impact is unavailable right now.';
  }
}

function normalizeRssItems(rssXml) {
  const parser = new DOMParser();
  const xmlDoc = parser.parseFromString(rssXml, 'application/xml');
  const rssItems = Array.from(xmlDoc.querySelectorAll('item'));
  return rssItems
    .map(item => ({
      title: safeText(item.querySelector('title')?.textContent || '', 'Patch Notes'),
      description: safeText(item.querySelector('description')?.textContent || '', 'No description provided.'),
      date: safeText(item.querySelector('pubDate')?.textContent || '', ''),
      url: safeText(item.querySelector('link')?.textContent || '', '')
    }))
    .filter(item => item.url && /patch[- ]?notes|patch [0-9]+/i.test(`${item.title} ${item.url}`));
}

function normalizeMirrorItems(markdownText) {
  const items = [];
  const pattern = /\[!\[Image [^\]]*\]\([^)]+\)\s*Game Updates\s*([0-9/]+)\s*([^\]]+)\]\((http[^)]+)\)/gi;
  let match;
  while ((match = pattern.exec(markdownText)) !== null) {
    const date = safeText(match[1], '');
    const titleAndDesc = safeText(match[2], '');
    const url = safeText(match[3], '');
    const notesIndex = titleAndDesc.search(/\bnotes\b/i);
    const title = notesIndex >= 0
      ? safeText(titleAndDesc.slice(0, notesIndex + 5), 'Patch Notes')
      : safeText(titleAndDesc, 'Patch Notes');
    const description = notesIndex >= 0
      ? safeText(titleAndDesc.slice(notesIndex + 5), 'No description provided.')
      : 'No description provided.';
    if (url && /patch[- ]?[0-9]+[-.]?[0-9]*[- ]?notes|league-of-legends-patch/i.test(`${title} ${url}`)) {
      items.push({ title, description, date, url });
    }
  }
  return items;
}

async function loadPatchNotes() {
  const sources = [
    async () => {
      const response = await fetch('https://r.jina.ai/http://www.leagueoflegends.com/en-us/news/tags/patch-notes');
      const text = await response.text();
      return normalizeMirrorItems(text);
    },
    async () => {
      const response = await fetch('https://www.leagueoflegends.com/page-data/en-us/news/tags/patch-notes/page-data.json');
      const payload = await response.json();
      return normalizePatchItems(payload);
    },
    async () => {
      const target = encodeURIComponent('https://www.leagueoflegends.com/page-data/en-us/news/tags/patch-notes/page-data.json');
      const response = await fetch(`https://api.allorigins.win/raw?url=${target}`);
      const payload = await response.json();
      return normalizePatchItems(payload);
    },
    async () => {
      const response = await fetch('https://r.jina.ai/http://www.leagueoflegends.com/en-us/news/tags/patch-notes');
      const text = await response.text();
      return normalizeMirrorItems(text);
    }
  ];

  try {
    for (const source of sources) {
      try {
        const items = await source();
        if (Array.isArray(items) && items.length) {
          renderPatchNotes(items);
          return;
        }
      } catch (sourceError) {
        console.warn('Patch source failed, trying fallback...', sourceError);
      }
    }
    document.getElementById('status').textContent = 'Failed to load patch notes right now.';
  } catch (error) {
    document.getElementById('status').textContent = 'Failed to load patch notes right now.';
    console.error(error);
  }
}

loadLatestPatchVersion();
loadPatchNotes();
</script>
</body>
</html>
